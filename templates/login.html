{% extends "base.html" %}
{% block title %}Login — AI Curator{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h4 class="mb-4 fw-bold"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h4>
            <div id="alert-box"></div>
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <p class="mt-3 text-center text-muted small">
                Don't have an account? <a href="/register">Register here</a>
            </p>
            <hr>
            <p class="text-center text-muted small mb-2">Forgot your password?</p>
            <form id="forgot-form" class="d-flex gap-2">
                <input type="text" id="forgot-username" class="form-control form-control-sm"
                       placeholder="Enter your username">
                <button type="submit" class="btn btn-outline-secondary btn-sm text-nowrap">Request Reset</button>
            </form>
            <div id="forgot-alert" class="mt-2"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
            window.location.href = '/';
        } else {
            showAlert('alert-box', data.error);
        }
    });

    document.getElementById('forgot-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('forgot-username').value.trim();
        if (!username) return;

        const res = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
        });
        const data = await res.json();

        if (res.ok) {
            showAlert('forgot-alert', 'Request sent. Please wait for the admin to reset your password.', 'info');
            document.getElementById('forgot-username').value = '';
        } else {
            showAlert('forgot-alert', data.error);
        }
    });
</script>
{% endblock %}
