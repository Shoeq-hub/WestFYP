{% extends "base.html" %}
{% block title %}Register — AI Curator{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h4 class="mb-4 fw-bold"><i class="bi bi-person-plus me-2"></i>Register</h4>
            <div id="alert-box"></div>
            <form id="register-form">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Choose a password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>
            <p class="mt-3 text-center text-muted small">
                Already have an account? <a href="/login">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
            showAlert('alert-box', 'Account created! Redirecting to login...', 'success');
            setTimeout(() => window.location.href = '/login', 1200);
        } else {
            showAlert('alert-box', data.error);
        }
    });
</script>
{% endblock %}
